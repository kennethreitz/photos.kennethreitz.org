{% extends "base.html" %}
{% block title %}{{ lens.display_name }} — ExifTree{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ lens.display_name }}</h1>
  <p>{{ lens.manufacturer }}</p>
</div>

<div x-data="{
  images: [],
  selected: -1,
  async init() {
    const res = await fetch('/api/lenses/{{ lens.id }}/images');
    this.images = await res.json();
  },
  nav(dir) {
    if (!this.images.length) return;
    this.selected = Math.max(0, Math.min(this.images.length - 1, this.selected + dir));
    this.$refs['card-' + this.selected]?.scrollIntoView({ block: 'nearest' });
  },
  open() {
    if (this.selected >= 0) this.$dispatch('lightbox', { images: this.images, index: this.selected });
  }
}" @keydown.right.window="nav(1)" @keydown.left.window="nav(-1)" @keydown.enter.window="open()">
  <div class="image-grid">
    <template x-for="(img, i) in images" :key="img.id">
      <div>
        <div class="image-card" :class="selected === i ? 'image-card-selected' : ''" :ref="'card-' + i" @mouseenter="selected = i" @click="$dispatch('lightbox', { images, index: i })" style="cursor: pointer;">
          <img :src="img.thumbnail_medium || img.thumbnail_small" :alt="img.title">
          <div class="overlay">
            <div class="exif-row">
              <div class="exif-left"><span x-text="img.camera" x-show="img.camera"></span></div>
              <div class="exif-right">
                <span x-show="img.focal_length" x-text="img.focal_length + 'mm'"></span>
                <span x-show="img.aperture" x-text="'f/' + img.aperture"></span>
                <span x-show="img.iso" x-text="'ISO ' + img.iso"></span>
              </div>
            </div>
          </div>
        </div>
        {% if not SINGLE_TENANT %}<a :href="'/@' + img.user" class="image-card-user" x-text="'@' + img.user"></a>{% endif %}
      </div>
    </template>
  </div>
  <div class="empty" x-show="images.length === 0">No images yet for this lens.</div>
</div>
{% endblock %}
