<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ExifTree{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-brand">ExifTree</a>
    <div class="nav-links">
      <a href="{% url 'tree:camera-list' %}">Cameras</a>
      <a href="{% url 'tree:lens-list' %}">Lenses</a>
      <a href="{% url 'users' %}">Users</a>
      <a href="{% url 'search:search' %}">Search</a>
    </div>
    <div class="nav-auth" x-data="{
      user: null, open: false,
      async init() {
        try {
          const token = localStorage.getItem('token');
          if (token) {
            const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
            if (res.ok) this.user = await res.json();
            else localStorage.removeItem('token');
          }
        } catch(e) {}
      }
    }" @click.outside="open = false">
      <template x-if="user">
        <div class="nav-user-dropdown">
          <button class="nav-user-btn" @click="open = !open" x-text="user.username"></button>
          <div class="dropdown-menu" x-show="open" x-transition>
            <a :href="'/@' + user.username">Profile</a>
            <a href="/dashboard/">Dashboard</a>
            <a href="/upload/">Upload</a>
            <hr>
            <a href="#" @click.prevent="localStorage.removeItem('token'); location.href='/'">Log out</a>
          </div>
        </div>
      </template>
      <template x-if="!user">
        <div class="nav-guest">
          <a href="{% url 'login' %}">Log in</a>
          <a href="{% url 'register' %}" class="btn btn-primary">Sign up</a>
        </div>
      </template>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>ExifTree — browse photography through the gear that made it.</p>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" x-data="{
    open: false,
    images: [],
    idx: 0,
    get img() { return this.images[this.idx] || {}; },
    show(imgs, i) { this.images = imgs; this.idx = i; this.open = true; document.body.style.overflow = 'hidden'; },
    close() { this.open = false; document.body.style.overflow = ''; },
    prev() { if (this.idx > 0) this.idx--; },
    next() { if (this.idx < this.images.length - 1) this.idx++; },
  }" x-show="open" x-transition.opacity
     @lightbox.window="show($event.detail.images, $event.detail.index)"
     @keydown.escape.window="close()"
     @keydown.left.window="if (open) { $event.preventDefault(); prev(); }"
     @keydown.right.window="if (open) { $event.preventDefault(); next(); }"
     @click="close()"
     class="lightbox" style="display: none;">
    <button class="lightbox-close" @click="close()">&times;</button>
    <button class="lightbox-nav lightbox-prev" @click.stop="prev()" x-show="idx > 0">&lsaquo;</button>
    <button class="lightbox-nav lightbox-next" @click.stop="next()" x-show="idx < images.length - 1">&rsaquo;</button>
    <img :src="img.thumbnail_large || img.thumbnail_medium || img.thumbnail_small" :alt="img.title" @click.stop>
    <div class="lightbox-info" @click.stop>
      <div class="lightbox-exif">
        <div class="exif-item" x-show="img.camera">
          <span class="exif-label">Camera</span>
          <span class="exif-value" x-text="img.camera"></span>
        </div>
        <div class="exif-item" x-show="img.focal_length">
          <span class="exif-label">Focal</span>
          <span class="exif-value" x-text="img.focal_length + 'mm'"></span>
        </div>
        <div class="exif-item" x-show="img.aperture">
          <span class="exif-label">Aperture</span>
          <span class="exif-value" x-text="'f/' + img.aperture"></span>
        </div>
        <div class="exif-item" x-show="img.iso">
          <span class="exif-label">ISO</span>
          <span class="exif-value" x-text="img.iso"></span>
        </div>
      </div>
      <div class="lightbox-user">
        <a :href="'/@' + img.user" x-text="'@' + img.user"></a>
      </div>
      <a :href="'/images/' + img.id + '/'" class="lightbox-link">View full details</a>
    </div>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
