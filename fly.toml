app = 'exiftree'
primary_region = 'iad'

[deploy]
  strategy = "bluegreen"

[build]

[processes]
  web = "uv run python manage.py runbolt --host 0.0.0.0 --port 8000"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["web"]
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [services.http_options]
    max_request_body_size = 52428800

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = 10000
    grace_period = "5s"
    method = "GET"
    path = "/health"
    timeout = 2000

[env]
  DJANGO_SETTINGS_MODULE = 'exiftree.settings'
  DEBUG = '0'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
