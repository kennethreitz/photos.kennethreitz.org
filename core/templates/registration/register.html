{% extends "base.html" %}
{% block title %}Sign up — ExifTree{% endblock %}
{% block content %}
<div class="auth-form" x-data="{ username: '', email: '', password: '', error: '' }">
  <h1>Sign up</h1>
  <form @submit.prevent="
    error = '';
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }),
    });
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('token', data.token);
      window.location.href = '/';
    } else {
      const data = await res.json();
      error = data.detail || 'Registration failed';
    }
  ">
    <div class="field">
      <label>Username</label>
      <input type="text" x-model="username" required autofocus>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" x-model="email" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" x-model="password" required minlength="8">
    </div>
    <p x-show="error" x-text="error" style="color: #f44; font-size: 0.9rem; margin-bottom: 0.5rem;"></p>
    <button type="submit" class="btn btn-primary">Sign up</button>
  </form>
  <p class="alt">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</div>
{% endblock %}
